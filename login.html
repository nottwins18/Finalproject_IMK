<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CampusCare - Masuk</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cc-navy: #000f37;
    --cc-navy-dark: #16254d;
    --cc-muted: #45464e;
    --cc-border: #c5c6cf;
  }

  body {
    min-height: 100vh;
    background: var(--cc-navy-dark);
    font-family: "Inter", -apple-system, Roboto, Helvetica, sans-serif;
  }

  a {
    text-decoration: none;
  }

  .cc-login-card {
    width: 420px;
    max-width: 100%;
    border-radius: 18px;
    box-shadow: 0 20px 50px 0 rgba(22, 37, 77, 0.15);
    padding: 32px;
  }

  .cc-login-logo {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    background: var(--cc-navy-dark);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
  }

  .cc-login-logo span {
    color: #fff;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.64px;
  }

  .cc-login-title {
    color: var(--cc-navy);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.6px;
  }

  .cc-login-subtitle {
    color: var(--cc-muted);
    font-size: 16px;
  }

  .cc-form-label {
    color: var(--cc-muted);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.13px;
    margin-bottom: 8px;
  }

  .cc-form-input {
    height: 48px;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid var(--cc-border);
    color: var(--cc-navy);
    font-size: 16px;
  }

  .cc-form-input::placeholder {
    color: #75767f;
  }

  .cc-form-input:focus {
    outline: none;
    box-shadow: none;
    border-color: var(--cc-navy-dark);
  }

  .cc-forgot-password {
    color: var(--cc-navy-dark);
    font-size: 14px;
    font-weight: 600;
  }

  .cc-forgot-password:hover {
    text-decoration: underline;
  }

  .cc-login-button {
    height: 52px;
    border: none;
    border-radius: 12px;
    background: var(--cc-navy-dark);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
  }

  .cc-login-button:hover {
    background: #101c3d;
    color: #fff;
  }

  .cc-signup-prompt {
    color: var(--cc-muted);
    font-size: 14px;
  }

  .cc-signup-prompt a {
    color: #b8860b;
    font-weight: 600;
  }

  .cc-signup-prompt a:hover {
    text-decoration: underline;
  }

  .cc-login-footer {
    color: rgba(255, 255, 255, 0.6);
    font-size: 13px;
  }
</style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center gap-4 p-3">

  <div class="cc-login-card card d-flex flex-column align-items-center">
    <div class="cc-login-logo d-flex align-items-center justify-content-center mb-3">
      <span>C</span>
    </div>
    <h1 class="cc-login-title mb-0">CampusCare</h1>
    <p class="cc-login-subtitle mb-0 mt-1">Selamat datang kembali</p>

    <form class="w-100 d-flex flex-column gap-3 mt-4" id="loginForm">
      <div class="d-flex flex-column">
        <label for="email" class="cc-form-label">Email</label>
        <input type="email" id="email" name="email" class="cc-form-input form-control" placeholder="winda@example.com" autocomplete="email" required />
      </div>

      <div class="d-flex flex-column">
        <label for="password" class="cc-form-label">Kata Sandi</label>
        <input type="password" id="password" name="password" class="cc-form-input form-control" placeholder="••••••••" autocomplete="current-password" required />
        <a href="#" class="cc-forgot-password align-self-end mt-2">Lupa Kata Sandi?</a>
      </div>

      <button type="submit" class="cc-login-button btn mt-2">Masuk</button>
    </form>

    <p class="cc-signup-prompt mb-0 mt-3 text-center">Belum punya akun? <a href="#">Hubungi Admin</a></p>
  </div>

  <p class="cc-login-footer mb-0 text-center">© 2024 CampusCare University Facility Management</p>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value.trim();
      if (!email || !password) {
        alert('Mohon isi email dan kata sandi.');
        return;
      }
      window.location.href = 'beranda.html';
    });
  </script>
</body>
</html>
