<style>
  :root {
    --cc-navy: #000f37;
    --cc-navy-dark: #16254d;
    --cc-text: #151c27;
    --cc-muted: #45464e;
    --cc-border: #c5c6cf;
  }

  body {
    font-family: "Inter", -apple-system, Roboto, Helvetica, sans-serif;
  }

  a {
    text-decoration: none;
  }

  /* Navbar */
  .cc-navbar {
    border-bottom: 1px solid #e4e4e7;
  }

  .cc-brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--cc-navy-dark);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
  }

  .cc-brand-name {
    color: var(--cc-navy);
    font-size: 18px;
    font-weight: 700;
  }

  .cc-nav-link {
    color: var(--cc-muted);
    font-size: 15px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    padding-bottom: 4px;
  }

  .cc-nav-link:hover {
    color: var(--cc-navy-dark);
  }

  .cc-nav-link.active {
    color: var(--cc-navy-dark);
    font-weight: 700;
    border-bottom-color: var(--cc-navy-dark);
  }

  .cc-icon-btn {
    width: 36px;
    height: 36px;
    color: var(--cc-muted);
    position: relative;
  }

  .cc-icon-btn:hover {
    background: #f0f3ff;
  }

  .cc-icon-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 16px;
    height: 15px;
    border-radius: 9999px;
    border: 2px solid #fff;
    background: #ba1a1a;
    color: #fff;
    font-size: 10px;
    line-height: 1;
  }

  .cc-avatar {
    width: 32px;
    height: 32px;
    border: 1px solid var(--cc-border);
    background: var(--cc-navy-dark);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  /* Page header */
  .cc-back-link {
    width: 36px;
    height: 36px;
    color: var(--cc-navy);
  }

  .cc-back-link:hover {
    background: #f0f3ff;
  }

  .cc-page-title {
    color: var(--cc-navy);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.24px;
  }

  /* Profile card */
  .cc-profile-card {
    border-radius: 14px;
    border: 1px solid rgba(197, 198, 207, 0.3);
    box-shadow: 0 4px 20px -2px rgba(22, 37, 77, 0.06);
    padding: 32px;
  }

  .cc-profile-avatar {
    width: 192px;
    height: 192px;
    border-radius: 9999px;
    background: #e2e8f8;
    overflow: hidden;
  }

  .cc-profile-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cc-profile-name {
    color: var(--cc-navy);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.24px;
  }

  .cc-role-badge {
    background: rgba(253, 198, 104, 0.2);
    color: #765100;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.13px;
    border-radius: 10px;
    padding: 4px 12px;
  }

  .cc-field-row {
    padding: 8px 0;
    border-bottom: 1px solid rgba(197, 198, 207, 0.3);
  }

  .cc-field-row:last-child {
    border-bottom: none;
  }

  .cc-field-label {
    color: var(--cc-muted);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.13px;
  }

  .cc-field-value {
    color: var(--cc-text);
    font-size: 16px;
  }

  /* Account details card */
  .cc-account-card {
    border-radius: 14px;
    border: 1px solid rgba(197, 198, 207, 0.3);
    box-shadow: 0 4px 20px -2px rgba(22, 37, 77, 0.06);
    padding: 32px;
  }

  .cc-account-card h2 {
    color: var(--cc-navy);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.24px;
  }

  .cc-account-row {
    padding: 16px 0;
    border-bottom: 1px solid rgba(197, 198, 207, 0.3);
  }

  .cc-account-row:last-child {
    border-bottom: none;
  }

  .cc-account-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #e2e8f8;
  }

  .cc-account-row-title {
    color: var(--cc-muted);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.13px;
  }

  .cc-account-row-value {
    color: var(--cc-text);
    font-size: 16px;
  }

  .cc-status-badge-active {
    background: #ecfdf5;
    color: #047857;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.13px;
    border-radius: 9999px;
    padding: 4px 12px;
  }

  .cc-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 9999px;
    background: #10b981;
  }

  /* Page actions */
  .cc-btn-edit {
    background: var(--cc-navy-dark);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.28px;
    padding: 17px 32px;
    border: none;
    border-radius: 10px;
  }

  .cc-btn-edit:hover {
    background: #0f1a38;
    color: #fff;
  }

  .cc-btn-password {
    border-radius: 10px;
    border: 1px solid var(--cc-border);
    background: #fff;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    color: var(--cc-navy);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.28px;
    padding: 16px 32px;
  }

  .cc-btn-password:hover {
    background: #f0f3ff;
    color: var(--cc-navy);
  }

  @media (max-width: 900px) {
    .cc-profile-card {
      text-align: center;
    }
  }
</style>
