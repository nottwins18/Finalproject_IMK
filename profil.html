<style>
  :root {
    --cc-navy: #16254d;
    --cc-navy-dark: #000f37;
    --cc-text: #45464e;
    --cc-text-dark: #151c27;
    --cc-border: #c5c6cf;
    --cc-border-light: #e4e4e7;
    --cc-bg-soft: #f0f3ff;
    --cc-amber: #f4be61;
    --cc-green: #35b26a;
    --cc-red: #e6483f;
  }

  html {
    scrollbar-gutter: stable;
  }

  body {
    font-family: "Inter", -apple-system, Roboto, Helvetica, sans-serif;
    background: #fff;
  }

  /* Navbar */
  .cc-navbar {
    height: 72px;
    border-bottom: 1px solid var(--cc-border-light);
  }

  .cc-brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--cc-navy);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
  }

  .cc-brand-name {
    color: var(--cc-navy-dark);
    font-size: 18px;
    font-weight: 700;
  }

  .cc-nav-link {
    color: var(--cc-text) !important;
    font-size: 15px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    padding-bottom: 4px !important;
  }

  .cc-nav-link:hover {
    color: var(--cc-navy) !important;
  }

  .cc-nav-link.active {
    color: var(--cc-navy) !important;
    font-weight: 700;
    border-bottom-color: var(--cc-navy);
  }

  .cc-icon-button {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 9999px;
    background: none;
    color: var(--cc-text);
  }

  .cc-icon-button:hover {
    background: var(--cc-bg-soft);
  }

  .cc-avatar {
    width: 32px;
    height: 32px;
    border-radius: 9999px;
    border: 1px solid var(--cc-border);
    background: var(--cc-navy);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  /* Page header */
  .cc-page-back {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 9999px;
    background: none;
    color: var(--cc-navy-dark);
  }

  .cc-page-back:hover {
    background: var(--cc-bg-soft);
  }

  .cc-page-title {
    color: var(--cc-navy-dark);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.24px;
  }

  /* Cards */
  .cc-profile-card,
  .cc-account-card {
    border-radius: 14px;
    border: 1px solid rgba(197, 198, 207, 0.3);
    box-shadow: 0 4px 20px -2px rgba(22, 37, 77, 0.06);
    background: #fff;
  }

  .cc-profile-card {
    padding: 32px;
  }

  .cc-account-card {
    padding: 32px;
  }

  .cc-avatar-lg {
    width: 192px;
    height: 192px;
    border-radius: 9999px;
    background: #e2e8f8;
    overflow: hidden;
  }

  .cc-avatar-lg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cc-profile-name {
    color: var(--cc-navy-dark);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.24px;
  }

  .cc-role-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 10px;
    background: rgba(253, 198, 104, 0.2);
    color: #765100;
    font-size: 13px;
    font-weight: 500;
  }

  .cc-info-row {
    padding: 8px 0;
    border-bottom: 1px solid rgba(197, 198, 207, 0.3);
  }

  .cc-info-row:last-child {
    border-bottom: none;
  }

  .cc-info-label {
    color: var(--cc-text);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.13px;
  }

  .cc-info-value {
    color: var(--cc-text-dark);
    font-size: 16px;
    font-weight: 400;
  }

  .cc-section-title {
    color: var(--cc-navy-dark);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.24px;
  }

  .cc-account-row {
    padding: 16px 0;
    border-bottom: 1px solid rgba(197, 198, 207, 0.3);
  }

  .cc-account-row:last-child {
    border-bottom: none;
  }

  .cc-account-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #e2e8f8;
  }

  .cc-status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px;
    border-radius: 9999px;
    background: #ecfdf5;
    color: #047857;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.13px;
  }

  .cc-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 9999px;
    background: #10b981;
  }
