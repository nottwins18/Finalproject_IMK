<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CampusCare - Buat Laporan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<style>
  :root {
    --cc-navy: #16254d;
    --cc-navy-dark: #000f37;
    --cc-text: #45464e;
    --cc-border: #c5c6cf;
    --cc-border-light: #e4e4e7;
    --cc-bg-soft: #f0f3ff;
  }

  html {
    scrollbar-gutter: stable;
  }

  body {
    font-family: "Inter", -apple-system, Roboto, Helvetica, sans-serif;
    background: #fff;
  }

  /* Navbar */
  .cc-navbar {
    height: 72px;
    border-bottom: 1px solid var(--cc-border-light);
  }

  .cc-brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--cc-navy);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
  }

  .cc-brand-name {
    color: var(--cc-navy-dark);
    font-size: 18px;
    font-weight: 700;
  }

  .cc-nav-link {
    color: var(--cc-text) !important;
    font-size: 15px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    padding-bottom: 4px !important;
  }

  .cc-nav-link:hover {
    color: var(--cc-navy) !important;
  }

  .cc-nav-link.active {
    color: var(--cc-navy) !important;
    font-weight: 700;
    border-bottom-color: var(--cc-navy);
  }

  .cc-icon-button {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 9999px;
    background: none;
    color: var(--cc-text);
  }

  .cc-icon-button:hover {
    background: var(--cc-bg-soft);
  }

  .cc-avatar {
    width: 32px;
    height: 32px;
    border-radius: 9999px;
    border: 1px solid var(--cc-border);
    background: var(--cc-navy);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  /* Form */
  .cc-form-label {
    color: var(--cc-navy-dark);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.13px;
  }

  .cc-form-select,
  .cc-form-input,
  .cc-form-textarea {
    border: 1px solid var(--cc-border);
    border-radius: 12px;
    color: #151c27;
    font-size: 16px;
  }

  .cc-form-select {
    padding: 12px 16px;
  }

  .cc-form-input {
    padding: 14px 16px 14px 48px;
  }

  .cc-location-wrapper {
    position: relative;
  }

  .cc-location-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #75767f;
    z-index: 5;
  }

  .cc-form-textarea {
    height: 280px;
    padding: 12px 16px;
    resize: none;
  }

  .cc-upload-dropzone {
    display: flex;
    height: 293px;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
    border-radius: 12px;
    border: 2px dashed var(--cc-border);
    background: #fff;
    cursor: pointer;
    position: relative;
  }

  .cc-upload-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .cc-upload-icon {
    display: flex;
    padding: 16px;
    align-items: center;
    justify-content: center;
    border-radius: 9999px;
    background: #e7eefe;
  }

  .cc-upload-title {
    color: var(--cc-navy-dark);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.13px;
  }

  .cc-upload-subtitle {
    color: var(--cc-text);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.13px;
  }

  .btn-cc-next {
    background: var(--cc-navy);
    color: #fff;
    padding: 14px 48px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.28px;
    border: none;
  }

  .btn-cc-next:hover {
    background: #0f1a38;
    color: #fff;
  }
</style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg cc-navbar px-4 px-lg-5">
    <div class="container-fluid p-0">
      <a class="navbar-brand d-flex align-items-center gap-2" href="beranda.html">
        <span class="cc-brand-mark d-flex align-items-center justify-content-center">C</span>
        <span class="cc-brand-name">CampusCare</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#ccNavbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="ccNavbarNav">
        <ul class="navbar-nav mx-auto gap-lg-4 mt-3 mt-lg-0">
          <li class="nav-item">
            <a class="nav-link cc-nav-link" href="beranda.html">Beranda</a>
          </li>
          <li class="nav-item">
            <a class="nav-link cc-nav-link" href="riwayat.html">Riwayat</a>
          </li>
          <li class="nav-item">
            <a class="nav-link cc-nav-link active" href="buatlaporan.html">Buat Laporan</a>
          </li>
        </ul>

        <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
          <button class="cc-icon-button d-flex align-items-center justify-content-center" aria-label="Notifikasi" id="btnNotifikasi">
            <svg width="18" height="20" viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 17V15H2V8C2 6.61667 2.41667 5.3875 3.25 4.3125C4.08333 3.2375 5.16667 2.53333 6.5 2.2V1.5C6.5 1.08333 6.64583 0.729167 6.9375 0.4375C7.22917 0.145833 7.58333 0 8 0C8.41667 0 8.77083 0.145833 9.0625 0.4375C9.35417 0.729167 9.5 1.08333 9.5 1.5V2.2C10.8333 2.53333 11.9167 3.2375 12.75 4.3125C13.5833 5.3875 14 6.61667 14 8V15H16V17H0ZM8 20C7.45 20 6.97917 19.8042 6.5875 19.4125C6.19583 19.0208 6 18.55 6 18H10C10 18.55 9.80417 19.0208 9.4125 19.4125C9.02083 19.8042 8.55 20 8 20ZM4 15H12V8C12 6.9 11.6083 5.95833 10.825 5.175C10.0417 4.39167 9.1 4 8 4C6.9 4 5.95833 4.39167 5.175 5.175C4.39167 5.95833 4 6.9 4 8V15Z" fill="#45464E"/>
            </svg>
          </button>
          <div class="vr"></div>
          <div class="cc-avatar d-flex align-items-center justify-content-center" id="btnAvatar" title="Profil Saya">WN</div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4 py-lg-5" style="max-width: 1280px;">
    <form id="formLaporan">
      <div class="row g-4">
        <div class="col-12 col-md-6">
          <label class="cc-form-label form-label" for="kategori">Kategori Laporan</label>
          <select class="form-select cc-form-select" id="kategori" name="kategori">
            <option>IT Support</option>
            <option>Fasilitas</option>
            <option>Kebersihan</option>
            <option>Keamanan</option>
          </select>
        </div>

        <div class="col-12 col-md-6">
          <label class="cc-form-label form-label" for="lokasi">Lokasi Kejadian</label>
          <div class="cc-location-wrapper">
            <svg class="cc-location-icon" width="16" height="20" viewBox="0 0 16 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 10C8.55 10 9.02083 9.80417 9.4125 9.4125C9.80417 9.02083 10 8.55 10 8C10 7.45 9.80417 6.97917 9.4125 6.5875C9.02083 6.19583 8.55 6 8 6C7.45 6 6.97917 6.19583 6.5875 6.5875C6.19583 6.97917 6 7.45 6 8C6 8.55 6.19583 9.02083 6.5875 9.4125C6.97917 9.80417 7.45 10 8 10ZM8 17.35C10.0333 15.4833 11.5417 13.7875 12.525 12.2625C13.5083 10.7375 14 9.38333 14 8.2C14 6.38333 13.4208 4.89583 12.2625 3.7375C11.1042 2.57917 9.68333 2 8 2C6.31667 2 4.89583 2.57917 3.7375 3.7375C2.57917 4.89583 2 6.38333 2 8.2C2 9.38333 2.49167 10.7375 3.475 12.2625C4.45833 13.7875 5.96667 15.4833 8 17.35ZM8 20C5.31667 17.7167 3.3125 15.5958 1.9875 13.6375C0.6625 11.6792 0 9.86667 0 8.2C0 5.7 0.804167 3.70833 2.4125 2.225C4.02083 0.741667 5.88333 0 8 0C10.1167 0 11.9792 0.741667 13.5875 2.225C15.1958 3.70833 16 5.7 16 8.2C16 9.86667 15.3375 11.6792 14.0125 13.6375C12.6875 15.5958 10.6833 17.7167 8 20Z" fill="#75767F"/>
            </svg>
            <input class="form-control cc-form-input" type="text" id="lokasi" name="lokasi" placeholder="Gedung A - Lt. 2, R.304" />
          </div>
        </div>

        <div class="col-12 col-md-6">
          <label class="cc-form-label form-label" for="ringkasan">Ringkasan Masalah</label>
          <textarea class="form-control cc-form-textarea" id="ringkasan" name="ringkasan" placeholder="Proyektor tidak menyala di ruang 304..."></textarea>
        </div>

        <div class="col-12 col-md-6">
          <label class="cc-form-label form-label" for="gambar">Upload Gambar</label>
          <label class="cc-upload-dropzone" for="gambar">
            <input class="cc-upload-input" type="file" id="gambar" name="gambar" accept="image/*" multiple />
            <div class="cc-upload-icon">
              <svg width="33" height="24" viewBox="0 0 33 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.25 24C5.975 24 4.03125 23.2125 2.41875 21.6375C0.80625 20.0625 0 18.1375 0 15.8625C0 13.9125 0.5875 12.175 1.7625 10.65C2.9375 9.125 4.475 8.15 6.375 7.725C7 5.425 8.25 3.5625 10.125 2.1375C12 0.7125 14.125 0 16.5 0C19.425 0 21.9062 1.01875 23.9438 3.05625C25.9813 5.09375 27 7.575 27 10.5C28.725 10.7 30.1562 11.4437 31.2938 12.7312C32.4313 14.0188 33 15.525 33 17.25C33 19.125 32.3438 20.7188 31.0312 22.0312C29.7188 23.3438 28.125 24 26.25 24H18C17.175 24 16.4688 23.7062 15.8813 23.1187C15.2938 22.5312 15 21.825 15 21V13.275L12.6 15.6L10.5 13.5L16.5 7.5L22.5 13.5L20.4 15.6L18 13.275V21H26.25C27.3 21 28.1875 20.6375 28.9125 19.9125C29.6375 19.1875 30 18.3 30 17.25C30 16.2 29.6375 15.3125 28.9125 14.5875C28.1875 13.8625 27.3 13.5 26.25 13.5H24V10.5C24 8.425 23.2687 6.65625 21.8062 5.19375C20.3438 3.73125 18.575 3 16.5 3C14.425 3 12.6562 3.73125 11.1938 5.19375C9.73125 6.65625 9 8.425 9 10.5H8.25C6.8 10.5 5.5625 11.0125 4.5375 12.0375C3.5125 13.0625 3 14.3 3 15.75C3 17.2 3.5125 18.4375 4.5375 19.4625C5.5625 20.4875 6.8 21 8.25 21H12V24H8.25Z" fill="#000F37"/>
              </svg>
            </div>
            <div class="text-center">
              <div class="cc-upload-title">Klik atau seret gambar ke sini</div>
              <div class="cc-upload-subtitle">Maks. 5 file (10 MB)</div>
            </div>
          </label>
        </div>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <button type="submit" class="btn btn-cc-next d-inline-flex align-items-center gap-2">
          Selanjutnya
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.10208 5.25H0V4.08333H7.10208L3.83542 0.816667L4.66667 0L9.33333 4.66667L4.66667 9.33333L3.83542 8.51667L7.10208 5.25Z" fill="white"/>
          </svg>
        </button>
      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('btnNotifikasi').addEventListener('click', function () {
      window.location.href = 'notifikasi.html';
    });
    document.getElementById('btnAvatar').addEventListener('click', function () {
      window.location.href = 'profil.html';
    });

    document.getElementById('formLaporan').addEventListener('submit', function (e) {
      e.preventDefault();
      var lokasi = document.getElementById('lokasi').value.trim();
      var ringkasan = document.getElementById('ringkasan').value.trim();
      if (!lokasi || !ringkasan) {
        alert('Mohon lengkapi lokasi kejadian dan ringkasan masalah.');
        return;
      }
      window.location.href = 'konfirmasilaporan.html';
    });
  </script>
</body>
</html>
