<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CampusCare - Buat Laporan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: #fff;
    font-family: "Inter", -apple-system, Roboto, Helvetica, sans-serif;
  }

  a {
    text-decoration: none;
  }

  /* Navbar */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    padding: 0 53px;
    border-bottom: 1px solid #e4e4e7;
  }

  .navbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    display: flex;
    width: 32px;
    height: 32px;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: #16254d;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
  }

  .brand-name {
    color: #000f37;
    font-size: 18px;
    font-weight: 700;
  }

  .navbar-nav {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .nav-link {
    padding-bottom: 4px;
    color: #45464e;
    font-size: 15px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
  }

  .nav-link:hover {
    color: #16254d;
  }

  .nav-link.active {
    color: #16254d;
    font-weight: 700;
    border-bottom-color: #16254d;
  }

  .navbar-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .icon-button {
    display: flex;
    width: 36px;
    height: 36px;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 9999px;
    background: none;
    color: #45464e;
    cursor: pointer;
  }

  .icon-button:hover {
    background: #f0f3ff;
  }

  .navbar-divider {
    width: 1px;
    height: 24px;
    background: #c5c6cf;
  }

  .avatar {
    display: flex;
    width: 32px;
    height: 32px;
    align-items: center;
    justify-content: center;
    border-radius: 9999px;
    border: 1px solid #c5c6cf;
    background: #16254d;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.13px;
  }

  /* Main content */
  .main-content {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 53px 64px;
  }

  .report-form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 24px;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-label {
    color: #000f37;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.13px;
  }

  .select-wrapper {
    position: relative;
  }

  .form-select {
    width: 100%;
    padding: 12px 40px 12px 16px;
    border-radius: 12px;
    border: 1px solid #c5c6cf;
    background: #fff;
    color: #151c27;
    font-family: inherit;
    font-size: 16px;
    font-weight: 400;
    line-height: 150%;
    appearance: none;
    cursor: pointer;
  }

  .select-chevron {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .location-input-wrapper {
    position: relative;
  }

  .location-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #75767f;
  }

  .form-input {
    width: 100%;
    padding: 14px 16px 14px 48px;
    border-radius: 12px;
    border: 1px solid #c5c6cf;
    background: #fff;
    color: #151c27;
    font-family: inherit;
    font-size: 16px;
    font-weight: 400;
  }

  .form-input::placeholder,
  .form-textarea::placeholder {
    color: #6b7280;
  }

  .form-textarea {
    width: 100%;
    height: 280px;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #c5c6cf;
    background: #fff;
    color: #151c27;
    font-family: inherit;
    font-size: 16px;
    font-weight: 400;
    line-height: 150%;
    resize: none;
  }

  .upload-dropzone {
    display: flex;
    height: 293px;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
    border-radius: 12px;
    border: 2px dashed #c5c6cf;
    background: #fff;
    cursor: pointer;
    position: relative;
  }

  .upload-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .upload-icon {
    display: flex;
    padding: 16px;
    align-items: center;
    justify-content: center;
    border-radius: 9999px;
    background: #e7eefe;
  }

  .upload-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .upload-title {
    color: #000f37;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.13px;
  }

  .upload-subtitle {
    color: #45464e;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.13px;
  }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn-next {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 48px;
    border: none;
    border-radius: 10px;
    background: #16254d;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.28px;
    cursor: pointer;
  }

  .btn-next:hover {
    background: #0f1a38;
  }
</style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-brand">
      <div class="brand-mark">C</div>
      <span class="brand-name">CampusCare</span>
    </div>

    <nav class="navbar-nav">
      <a href="beranda.html" class="nav-link">Beranda</a>
      <a href="riwayat.html" class="nav-link">Riwayat</a>
      <a href="buatlaporan.html" class="nav-link active">Buat Laporan</a>
    </nav>

    <div class="navbar-actions">
      <button class="icon-button" aria-label="Notifikasi">
        <svg width="18" height="20" viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 17V15H2V8C2 6.61667 2.41667 5.3875 3.25 4.3125C4.08333 3.2375 5.16667 2.53333 6.5 2.2V1.5C6.5 1.08333 6.64583 0.729167 6.9375 0.4375C7.22917 0.145833 7.58333 0 8 0C8.41667 0 8.77083 0.145833 9.0625 0.4375C9.35417 0.729167 9.5 1.08333 9.5 1.5V2.2C10.8333 2.53333 11.9167 3.2375 12.75 4.3125C13.5833 5.3875 14 6.61667 14 8V15H16V17H0ZM8 20C7.45 20 6.97917 19.8042 6.5875 19.4125C6.19583 19.0208 6 18.55 6 18H10C10 18.55 9.80417 19.0208 9.4125 19.4125C9.02083 19.8042 8.55 20 8 20ZM4 15H12V8C12 6.9 11.6083 5.95833 10.825 5.175C10.0417 4.39167 9.1 4 8 4C6.9 4 5.95833 4.39167 5.175 5.175C4.39167 5.95833 4 6.9 4 8V15Z" fill="#45464E"/>
        </svg>
      </button>
      <div class="navbar-divider"></div>
      <div class="avatar">WN</div>
    </div>
  </header>

  <main class="main-content">
    <form class="report-form-grid">
      <div class="form-field">
        <label class="form-label" for="kategori">Kategori Laporan</label>
        <div class="select-wrapper">
          <select class="form-select" id="kategori" name="kategori">
            <option>IT Support</option>
            <option>Fasilitas</option>
            <option>Kebersihan</option>
            <option>Keamanan</option>
          </select>
          <svg class="select-chevron" width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 7.4L0 1.4L1.4 0L6 4.6L10.6 0L12 1.4L6 7.4Z" fill="#75767F"/>
          </svg>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="lokasi">Lokasi Kejadian</label>
        <div class="location-input-wrapper">
          <svg class="location-icon" width="16" height="20" viewBox="0 0 16 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 10C8.55 10 9.02083 9.80417 9.4125 9.4125C9.80417 9.02083 10 8.55 10 8C10 7.45 9.80417 6.97917 9.4125 6.5875C9.02083 6.19583 8.55 6 8 6C7.45 6 6.97917 6.19583 6.5875 6.5875C6.19583 6.97917 6 7.45 6 8C6 8.55 6.19583 9.02083 6.5875 9.4125C6.97917 9.80417 7.45 10 8 10ZM8 17.35C10.0333 15.4833 11.5417 13.7875 12.525 12.2625C13.5083 10.7375 14 9.38333 14 8.2C14 6.38333 13.4208 4.89583 12.2625 3.7375C11.1042 2.57917 9.68333 2 8 2C6.31667 2 4.89583 2.57917 3.7375 3.7375C2.57917 4.89583 2 6.38333 2 8.2C2 9.38333 2.49167 10.7375 3.475 12.2625C4.45833 13.7875 5.96667 15.4833 8 17.35ZM8 20C5.31667 17.7167 3.3125 15.5958 1.9875 13.6375C0.6625 11.6792 0 9.86667 0 8.2C0 5.7 0.804167 3.70833 2.4125 2.225C4.02083 0.741667 5.88333 0 8 0C10.1167 0 11.9792 0.741667 13.5875 2.225C15.1958 3.70833 16 5.7 16 8.2C16 9.86667 15.3375 11.6792 14.0125 13.6375C12.6875 15.5958 10.6833 17.7167 8 20Z" fill="#75767F"/>
          </svg>
          <input class="form-input" type="text" id="lokasi" name="lokasi" placeholder="Gedung A - Lt. 2, R.304" />
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="ringkasan">Ringkasan Masalah</label>
        <textarea class="form-textarea" id="ringkasan" name="ringkasan" placeholder="Proyektor tidak menyala di ruang 304..."></textarea>
      </div>

      <div class="form-field">
        <label class="form-label" for="gambar">Upload Gambar</label>
        <label class="upload-dropzone" for="gambar">
          <input class="upload-input" type="file" id="gambar" name="gambar" accept="image/*" multiple />
          <div class="upload-icon">
            <svg width="33" height="24" viewBox="0 0 33 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8.25 24C5.975 24 4.03125 23.2125 2.41875 21.6375C0.80625 20.0625 0 18.1375 0 15.8625C0 13.9125 0.5875 12.175 1.7625 10.65C2.9375 9.125 4.475 8.15 6.375 7.725C7 5.425 8.25 3.5625 10.125 2.1375C12 0.7125 14.125 0 16.5 0C19.425 0 21.9062 1.01875 23.9438 3.05625C25.9813 5.09375 27 7.575 27 10.5C28.725 10.7 30.1562 11.4437 31.2938 12.7312C32.4313 14.0188 33 15.525 33 17.25C33 19.125 32.3438 20.7188 31.0312 22.0312C29.7188 23.3438 28.125 24 26.25 24H18C17.175 24 16.4688 23.7062 15.8813 23.1187C15.2938 22.5312 15 21.825 15 21V13.275L12.6 15.6L10.5 13.5L16.5 7.5L22.5 13.5L20.4 15.6L18 13.275V21H26.25C27.3 21 28.1875 20.6375 28.9125 19.9125C29.6375 19.1875 30 18.3 30 17.25C30 16.2 29.6375 15.3125 28.9125 14.5875C28.1875 13.8625 27.3 13.5 26.25 13.5H24V10.5C24 8.425 23.2687 6.65625 21.8062 5.19375C20.3438 3.73125 18.575 3 16.5 3C14.425 3 12.6562 3.73125 11.1938 5.19375C9.73125 6.65625 9 8.425 9 10.5H8.25C6.8 10.5 5.5625 11.0125 4.5375 12.0375C3.5125 13.0625 3 14.3 3 15.75C3 17.2 3.5125 18.4375 4.5375 19.4625C5.5625 20.4875 6.8 21 8.25 21H12V24H8.25Z" fill="#000F37"/>
            </svg>
          </div>
          <div class="upload-text">
            <span class="upload-title">Klik atau seret gambar ke sini</span>
            <span class="upload-subtitle">Maks. 5 file (10 MB)</span>
          </div>
        </label>
      </div>
    </form>

    <div class="form-actions">
      <button type="submit" class="btn-next">
        Selanjutnya
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7.10208 5.25H0V4.08333H7.10208L3.83542 0.816667L4.66667 0L9.33333 4.66667L4.66667 9.33333L3.83542 8.51667L7.10208 5.25Z" fill="white"/>
        </svg>
      </button>
    </div>
  </main>
</body>
</html>
